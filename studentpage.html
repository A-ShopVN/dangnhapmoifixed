<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Library</title>

<style>
/* ===== RESET ===== */
/* ================= RESET ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

/* ================= LAYOUT ================= */
body{
  display:flex;
  height:100vh;
}

/* ================= GLASS BASE ================= */
.glass{
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  border:1px solid rgba(255,255,255,0.4);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);
  border-radius:24px;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:260px;
  padding:25px 20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sidebar{
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(35px);
  border-right:1px solid rgba(255,255,255,0.5);
}

.profile{
  text-align:center;
  margin-bottom:25px;
}

.profile img{
  width:85px;
  height:85px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.profile h3{
  font-size:16px;
  font-weight:600;
}

.profile p{
  font-size:13px;
  opacity:0.7;
}

/* ================= NAV ================= */
.nav-btn{
  background:transparent;
  border:none;
  padding:12px 14px;
  text-align:left;
  border-radius:14px;
  cursor:pointer;
  transition:0.25s ease;
  font-size:15px;
}

.nav-btn:hover{
  background:rgba(255,255,255,0.35);
}

.nav-btn.active{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(15px);
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
  font-weight:600;
}

/* ================= LOGOUT ================= */
.logout{
  margin-top:auto;
  border:none;
  padding:12px;
  border-radius:18px;
  background:linear-gradient(135deg,#ff4d4d,#ff1a1a);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.logout:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(255,0,0,0.3);
}

/* ================= MAIN ================= */
.main{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ================= SECTION ================= */
.section{
  display:none;
  flex:1;
  overflow:hidden;
  animation:fadeIn 0.4s ease;
}

.section.active{
  display:flex;
  flex-direction:column;
}

/* ================= BOARD ================= */
.board{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  height:100%;
}

/* ================= COLUMN GLASS ================= */
.column{
  display:flex;
  flex-direction:column;
  padding:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(30px);
  border-radius:28px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

.column h3{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

/* Scroll riêng từng cột */
.column > div{
  flex:1;
  overflow-y:auto;
  padding-right:5px;
}

/* ================= CARD ================= */
.card{
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(20px);
  padding:16px;
  border-radius:20px;
  margin-bottom:12px;
  transition:0.25s ease;
  border-left:6px solid rgba(255,255,255,0.6);
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* trạng thái */
.borrowing{ border-left-color:#ffb020; }
.overdue{ border-left-color:#ff3b30; }
.returned{ border-left-color:#34c759; }

/* ================= BADGE ================= */
.badge{
  background:rgba(0,0,0,0.7);
  color:white;
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* ================= HISTORY ================= */
#historyList{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
}

/* ================= FEEDBACK ================= */
#feedback iframe{
  flex:1;
  width:100%;
  border:none;
  border-radius:28px;
  backdrop-filter:blur(20px);
}

/* ================= HIDE SCROLLBAR ================= */
::-webkit-scrollbar{
  width:0px;
  background:transparent;
}

*{
  scrollbar-width:none;
}

/* ================= FADE ================= */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="profile">
    <img id="avatar">
    <h3 id="name"></h3>
    <p id="email"></p>
  </div>

  <button class="nav-btn active" onclick="showSection('home', this)">📚 Trang chính</button>
  <button class="nav-btn" onclick="showSection('history', this)">📖 Lịch sử mượn</button>
  <button class="nav-btn" onclick="showSection('feedback', this)">💬 Feedback</button>

  <button class="logout" onclick="logout()">Đăng xuất</button>
</div>

<div class="main">

  <div id="home" class="section active">
    <div class="board">

      <div class="column">
        <h3>🟡 Đang mượn <span class="badge" id="borrowCount">0</span></h3>
        <div id="borrowList"></div>
      </div>

      <div class="column">
        <h3>🔴 Quá hạn <span class="badge" id="overdueCount">0</span></h3>
        <div id="overdueList"></div>
      </div>

      <div class="column">
        <h3>🟢 Đã trả <span class="badge" id="returnCount">0</span></h3>
        <div id="returnList"></div>
      </div>

    </div>
  </div>

  <div id="history" class="section">
    <h2>📖 Lịch sử mượn</h2>
    <div id="historyList"></div>
  </div>

  <div id="feedback" class="section">
    
    <iframe src="feedback.html"></iframe>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import { 
  getFirestore,
  doc,
  updateDoc,
  serverTimestamp,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEdkzclcyqLDQv8kRUBN4l71AggHn1jKc",
  authDomain: "student-admin-system-f92e7.firebaseapp.com",
  projectId: "student-admin-system-f92e7",
  storageBucket: "student-admin-system-f92e7.firebasestorage.app",
  messagingSenderId: "693112425401",
  appId: "1:693112425401:web:dd2285bd4eada7a6750468"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBheU1Zxps0sQ0DTdJtRzbaFE3Wm2g-vr8mO4GYKmr9raDtKET7xpOnnTcygnkkKGHwx7LzJBETL72/pub?output=csv";

let unsubscribeSnapshot = null;


// ================= AUTH CHECK =================
onAuthStateChanged(auth, (user)=>{

  if(!user){
    window.location.href="index.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);

  // Nếu có listener cũ thì hủy
  if(unsubscribeSnapshot){
    unsubscribeSnapshot();
  }

  // 🔥 Lắng nghe realtime block
  unsubscribeSnapshot = onSnapshot(userRef, async (snap)=>{

    if(!snap.exists()) return;

    const data = snap.data();

    if(data.status === "blocked"){
      alert("Tài khoản của bạn đã bị khóa!");
      await signOut(auth);
      window.location.href="index.html";
    }

  });

  // Hiển thị thông tin
  document.getElementById("avatar").src = user.photoURL || "https://i.pravatar.cc/150";
  document.getElementById("name").textContent = user.displayName || "Student";
  document.getElementById("email").textContent = user.email;

  loadData(user.email.toLowerCase());
});


// ================= LOAD GOOGLE SHEET =================
async function loadData(userEmail){

  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = text.split("\n").map(r=>r.split(","));
  const headers = rows[0];

  const idxEmail = headers.indexOf("Địa chỉ email");
  const idxBook1 = headers.indexOf("Cuốn thứ nhất");
  const idxBook2 = headers.indexOf("Cuốn thứ hai");
  const idxBook3 = headers.indexOf("Cuốn thứ ba");
  const idxReturnDate = headers.indexOf("Ngày trả");
  const idxStatus = headers.indexOf("Trạng thái");

  const today = new Date();
  today.setHours(0,0,0,0);

  const borrowList = document.getElementById("borrowList");
  const overdueList = document.getElementById("overdueList");
  const returnList = document.getElementById("returnList");
  const historyList = document.getElementById("historyList");

  borrowList.innerHTML="";
  overdueList.innerHTML="";
  returnList.innerHTML="";
  historyList.innerHTML="";

  history.pushState(null, null, location.href);
  window.onpopstate = () => history.go(1);

  let borrowCount=0, overdueCount=0, returnCount=0;

  const userRows = rows.slice(1).filter(row =>
    row[idxEmail] &&
    row[idxEmail].trim().toLowerCase() === userEmail
  );

  userRows.forEach(row=>{

    const books=[row[idxBook1],row[idxBook2],row[idxBook3]].filter(b=>b && b.trim()!== "");
    const sheetStatus=row[idxStatus]?row[idxStatus].trim():"";
    const returnDateRaw=row[idxReturnDate];

    let finalStatus="Đang mượn";

    if(sheetStatus.toLowerCase().includes("đã trả")){
      finalStatus="Đã trả xong";
    }else if(returnDateRaw){
      const parts=returnDateRaw.split("/");
      if(parts.length===3){
        const due=new Date(parts[2],parts[1]-1,parts[0]);
        if(today>due) finalStatus="Quá hạn";
      }
    }

    books.forEach(book=>{
      const card=document.createElement("div");
      card.className="card";

      if(finalStatus==="Đang mượn"){
        card.classList.add("borrowing");
        borrowList.appendChild(card);
        borrowCount++;
      }
      else if(finalStatus==="Quá hạn"){
        card.classList.add("overdue");
        overdueList.appendChild(card);
        overdueCount++;
      }
      else{
        card.classList.add("returned");
        returnList.appendChild(card);
        returnCount++;
      }

      card.innerHTML=`
        <strong>${book}</strong>
        <div>Hạn trả: ${returnDateRaw || "Không có"}</div>
        <div>Trạng thái: ${finalStatus}</div>
      `;

      historyList.appendChild(card.cloneNode(true));
    });

  });

  document.getElementById("borrowCount").textContent=borrowCount;
  document.getElementById("overdueCount").textContent=overdueCount;
  document.getElementById("returnCount").textContent=returnCount;
}


// ================= LOGOUT =================
window.logout = async function(){

  const user = auth.currentUser;

  if(user){
    await updateDoc(doc(db, "users", user.uid), {
      online: false,
      lastSeen: serverTimestamp()
    });
  }

  await signOut(auth);
  window.location.href="index.html";
}


// ================= TAB CLOSE =================
window.addEventListener("beforeunload", async () => {

  const user = auth.currentUser;

  if(user){
    await updateDoc(doc(db, "users", user.uid), {
      online: false,
      lastSeen: serverTimestamp()
    });
  }

});


// ================= NAV SWITCH =================
window.showSection=function(id,btn){
  document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

</script>

</body>
</html>
