<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCEdkzclcyqLDQv8kRUBN4l71AggHn1jKc",
  authDomain: "student-admin-system-f92e7.firebaseapp.com",
  projectId: "student-admin-system-f92e7",
  storageBucket: "student-admin-system-f92e7.firebasestorage.app",
  messagingSenderId: "693112425401",
  appId: "1:693112425401:web:dd2285bd4eada7a6750468"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* CHẶN BACK */
history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

/* LOAD USER */
onAuthStateChanged(auth, (user)=>{
  if(user){
    adminName.textContent = user.displayName;
    adminAvatar.src = user.photoURL;
    loadFeedback();
  }else{
    window.location.href="studentpage.html";
  }
});

/* LOAD FEEDBACK */
async function loadFeedback(){
  const table = document.getElementById("feedbackTable");
  const countSpan = document.getElementById("totalCount");
  const filter = document.getElementById("filterType").value;

  table.innerHTML="";
  let total=0;

  const q = query(collection(db,"feedback"), orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    if(filter && data.type !== filter) return;

    total++;

    let badgeClass="";
    if(data.type==="bug") badgeClass="bug";
    else if(data.type==="suggestion") badgeClass="suggestion";
    else badgeClass="other";

    table.innerHTML += `
      <tr>
        <td>${data.name}</td>
        <td>${data.email}</td>
        <td>${data.class}</td>
        <td><span class="badge ${badgeClass}">${data.type}</span></td>
        <td>${data.content}</td>
        <td>
          <button class="delete-btn" onclick="deleteFeedback('${docSnap.id}')">
            Xoá
          </button>
        </td>
      </tr>
    `;
  });

  countSpan.textContent = total;
}

/* XOÁ */
window.deleteFeedback = async function(id){
  const result = await Swal.fire({
    title:"Xác nhận xoá?",
    icon:"warning",
    showCancelButton:true,
    confirmButtonColor:"#ef4444",
    confirmButtonText:"Xoá",
    cancelButtonText:"Huỷ"
  });

  if(result.isConfirmed){
    await deleteDoc(doc(db,"feedback",id));
    Swal.fire("Đã xoá!","","success");
    loadFeedback();
  }
}

/* LOGOUT */
window.logoutAdmin = async function(){
  await signOut(auth);
  window.location.href="index.html";
}

window.applyFilter = loadFeedback;

/* CHUYỂN TAB */
window.switchTab = function(tab){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(tab).style.display="block";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
}

/* SIDEBAR */
.sidebar{
  width:250px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.65);
  border-right:1px solid rgba(255,255,255,0.4);
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* PROFILE */
.profile{
  text-align:center;
}

.profile img{
  width:75px;
  height:75px;
  border-radius:50%;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.profile h3{
  font-size:15px;
  font-weight:600;
}

/* NAV */
.menu-btn{
  width:100%;
  border:none;
  padding:14px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  color:#111;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(15px);
  box-shadow:
    0 8px 20px rgba(0,0,0,.05),
    inset 0 2px 6px rgba(255,255,255,.8);
  transition:all .25s ease;
  position:relative;
  overflow:hidden;
  margin-top:14px;
}

/* hover nổi nhẹ */
.menu-btn:hover{
  transform:translateX(6px);
  background:rgba(255,255,255,0.8);
  box-shadow:
    0 15px 35px rgba(0,0,0,.08),
    inset 0 2px 6px rgba(255,255,255,.9);
}

/* active */
.menu-btn.active{
  background:white;
  font-weight:600;
  box-shadow:
    0 15px 40px rgba(0,0,0,.1),
    inset 0 2px 8px rgba(255,255,255,.95);
}

/* ánh sáng lướt */
.menu-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,
    transparent,
    rgba(255,255,255,.5),
    transparent);
  transition:.6s;
}

.menu-btn:hover::before{
  left:100%;
}

.menu-btn{
  position:relative;
}

/* ACTIVE mạnh hơn */
.menu-btn.active{
  background:white;
  font-weight:600;
  transform:translateX(8px);
  box-shadow:
    0 18px 45px rgba(0,0,0,.12),
    inset 0 2px 8px rgba(255,255,255,.95);
}

/* thanh sáng bên trái */
.menu-btn.active::after{
  content:"";
  position:absolute;
  left:-12px;
  top:50%;
  transform:translateY(-50%);
  width:6px;
  height:60%;
  border-radius:10px;
  background:linear-gradient(180deg,#ffffff,#dbeafe);
  box-shadow:
    0 0 15px rgba(59,130,246,.6);
}

/* LOGOUT */
.logout{
  width:100%;
  border:none;
  padding:14px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  color:white;
  background:linear-gradient(135deg,#ff4d4d,#dc2626);
  box-shadow:
    0 12px 30px rgba(220,38,38,.35),
    inset 0 2px 6px rgba(255,255,255,.25);
  transition:all .25s ease;
  position:relative;
  overflow:hidden;
}

/* hiệu ứng ánh sáng lướt */
.logout::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,
    transparent,
    rgba(255,255,255,.4),
    transparent);
  transition:.6s;
}

.logout:hover{
  transform:translateY(-3px);
  box-shadow:
    0 18px 40px rgba(220,38,38,.45),
    inset 0 2px 6px rgba(255,255,255,.3);
}

.logout:hover::before{
  left:100%;
}

.logout:active{
  transform:scale(.97);
}
/* CONTENT */
.content{
  flex:1;
  padding:10px;
  overflow:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.count{
  background:white;
  padding:6px 14px;
  border-radius:30px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  font-size:13px;
}

/* CARD */
.card{
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(20px);
  height: 80vh;
  overflow: hidden;
  overflow-y: auto;
  padding:25px;
  border-radius:14px;
  box-shadow:0 15px 40px rgba(0,0,0,.07);
}

/* Ẩn 2 nút mũi tên */
::-webkit-scrollbar-button {
  display: none;
  height: 0;
  width: 0;
}

/* Thanh scroll gọn bên trong */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
  margin: 10px 0; /* cách đầu cuối */
}

::-webkit-scrollbar-thumb {
  background: rgba(148,163,184,0.6);
  border-radius: 20px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(100,116,139,0.8);
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th,td{padding:12px;font-size:14px;text-align:left;}
thead{background:rgba(255,255,255,.7);}
tbody tr{border-top:1px solid #e2e8f0;}
tbody tr:hover{background:rgba(255,255,255,.6);}

/* BADGE */
.badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}
.badge.bug{background:#fee2e2;color:#991b1b;}
.badge.suggestion{background:#dbeafe;color:#1e40af;}
.badge.other{background:#dcfce7;color:#166534;}

/* DELETE */
.delete-btn{
  border:none;
  padding:7px 12px;
  border-radius:10px;
  background:#ef4444;
  color:white;
  cursor:pointer;
  transition:.2s;
}
.delete-btn:hover{
  background:#dc2626;
  transform:scale(1.05);
}

.iframe-card{
  padding:0;        /* bỏ padding để iframe full */
  overflow:hidden;
  height: 97vh;  /* tránh tràn góc */
}

.iframe-card iframe{
  width:100%;
  height:97vh;      /* chiều cao lớn, có thể chỉnh 100vh nếu muốn */
  border:none;
  display:block;
}

select{
  padding:8px 12px;
  border-radius:14px;
  border:1px solid #e2e8f0;
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="profile">
      <img id="adminAvatar">
      <h3 id="adminName">Admin</h3>
    </div>

    <div class="nav">
      <button class="active menu-btn" onclick="switchTab('feedbackSection')">💬 Feedback</button>
      <button class="menu-btn" onclick="switchTab('bookSection')">📚 Quản lí sách</button>
      <button class="menu-btn" onclick="switchTab('userSection')">👥 Quản lí User</button>
    </div>
  </div>

  <button class="nav logout" onclick="logoutAdmin()">🚪 Đăng xuất</button>
</div>

<div class="content">

  <!-- FEEDBACK -->
  <div id="feedbackSection" class="section">
    <div class="header">
      <h2>Danh sách Feedback</h2>
      <div class="count">Tổng: <span id="totalCount">0</span></div>
    </div>

    <select id="filterType" onchange="applyFilter()">
      <option value="">Tất cả</option>
      <option value="bug">Báo lỗi</option>
      <option value="suggestion">Đề xuất</option>
      <option value="other">Khác</option>
    </select>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Tên</th>
            <th>Email</th>
            <th>Lớp</th>
            <th>Loại</th>
            <th>Nội dung</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="feedbackTable"></tbody>
      </table>
    </div>
  </div>

  <!-- QUẢN LÍ SÁCH -->
<div id="bookSection" class="section" style="display:none;">
  <div class="card iframe-card">
    <iframe 
      src="https://linhkim247.github.io/pagequanli/" 
      frameborder="0">
    </iframe>
  </div>
</div>
<!-- quan li ng dung -->

<div id="userSection" class="section" style="display:none;">

  <div class="card iframe-card">
    <iframe 
      src="user.html" 
      frameborder="0">
    </iframe>
  </div>
</div>

</div>

</body>
</html>
